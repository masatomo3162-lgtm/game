<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jun's Game Library</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3250;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --text: #e2e4f0;
  --text-dim: #8890b0;
  --played: #34d399;
  --badge-bg: #1e2340;
  --badge-border: #3a3f6e;
  --steam: #1b2838;
  --epic: #2d2d2d;
  --gog: #86328a;
  --amazon: #ff9900;
  --ea: #f15d28;
  --humble: #cc2929;
  --font-head: 'Rajdhani', 'Segoe UI', sans-serif;
  --font-body: 'Inter', 'Segoe UI', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  font-size: 14px;
}

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #151829 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.header-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text);
}

h1 span {
  color: var(--accent2);
}

.header-stats {
  margin-left: auto;
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
}

.stat-badge {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.stat-badge strong {
  color: var(--text);
  font-size: 16px;
  line-height: 1;
}

/* ── SEARCH ── */
.search-bar {
  position: relative;
}

.search-bar input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 36px 8px 12px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.search-bar input:focus {
  border-color: var(--accent);
}

.search-bar input::placeholder { color: var(--text-dim); }

.search-icon {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
  font-size: 16px;
}

/* ── LAYOUT ── */
.layout {
  display: flex;
  gap: 0;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  height: calc(100vh - 120px);
  overflow-y: auto;
  position: sticky;
  top: 120px;
  padding: 16px 0;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-section {
  padding: 0 14px;
  margin-bottom: 20px;
}

.sidebar-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
  padding: 0 2px;
}

/* ── GENRE CHECKBOXES ── */
.genre-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.genre-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.genre-item:hover { background: var(--surface2); }

.genre-item.active { background: rgba(124,106,247,0.15); }

.genre-item input[type="checkbox"] {
  display: none;
}

.genre-checkbox {
  width: 14px; height: 14px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  flex-shrink: 0;
  position: relative;
  transition: all 0.15s;
}

.genre-item.active .genre-checkbox {
  background: var(--accent);
  border-color: var(--accent);
}

.genre-item.active .genre-checkbox::after {
  content: "";
  position: absolute;
  left: 2px; top: -1px;
  width: 5px; height: 9px;
  border: 2px solid white;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}

.genre-name {
  font-size: 13px;
  color: var(--text);
  flex: 1;
}

.genre-count {
  font-size: 11px;
  color: var(--text-dim);
}

/* Filter mode (AND/OR) */
.filter-mode {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 10px;
}

.filter-mode button {
  flex: 1;
  padding: 5px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
}

.filter-mode button.active {
  background: var(--accent);
  color: white;
}

.clear-btn {
  width: 100%;
  padding: 6px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
  margin-top: 6px;
}

.clear-btn:hover {
  border-color: var(--accent);
  color: var(--accent2);
}

/* Source filter */
.source-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.source-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.source-item:hover { background: var(--surface2); }
.source-item.active { background: rgba(124,106,247,0.12); }

.source-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.source-dot.Steam { background: #66c0f4; }
.source-dot.Epic { background: #aaa; }
.source-dot.GOG { background: #c06de8; }
.source-dot.Amazon { background: #ff9900; }
.source-dot.EA { background: #f15d28; }
.source-dot.Humble { background: #cc4444; }

.source-item input[type="checkbox"] { display: none; }
.source-checkbox {
  width: 14px; height: 14px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  flex-shrink: 0;
  position: relative;
  transition: all 0.15s;
}
.source-item.active .source-checkbox {
  background: var(--accent);
  border-color: var(--accent);
}
.source-item.active .source-checkbox::after {
  content: "";
  position: absolute;
  left: 2px; top: -1px;
  width: 5px; height: 9px;
  border: 2px solid white;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}

/* Played filter */
.played-filter {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.played-btn {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
}

.played-btn.active {
  background: var(--played);
  border-color: var(--played);
  color: #0f1117;
  font-weight: 600;
}

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  overflow: auto;
  min-width: 0;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 120px;
  z-index: 50;
}

.result-count {
  font-size: 13px;
  color: var(--text-dim);
  flex: 1;
}

.result-count strong { color: var(--text); }

/* Sort controls */
.sort-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.sort-label {
  font-size: 12px;
  color: var(--text-dim);
}

.sort-btn {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.sort-btn.active {
  border-color: var(--accent);
  color: var(--accent2);
}

/* ── TABLE ── */
.game-table {
  width: 100%;
  border-collapse: collapse;
}

.game-table th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 163px;
  z-index: 40;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}

.game-table th:hover { color: var(--text); }
.game-table th.sorted { color: var(--accent2); }

.game-table th .sort-arrow {
  display: inline-block;
  margin-left: 4px;
  opacity: 0.5;
}
.game-table th.sorted .sort-arrow { opacity: 1; }

.game-table tbody tr {
  border-bottom: 1px solid rgba(46,50,80,0.5);
  transition: background 0.1s;
}

.game-table tbody tr:hover {
  background: var(--surface2);
}

.game-table td {
  padding: 8px 12px;
  vertical-align: middle;
}

/* Played checkbox column */
td.col-played {
  width: 50px;
  text-align: center;
}

.play-check {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  position: relative;
  transition: all 0.15s;
  display: inline-block;
  vertical-align: middle;
}

.play-check:checked {
  background: var(--played);
  border-color: var(--played);
}

.play-check:checked::after {
  content: "";
  position: absolute;
  left: 3px; top: -1px;
  width: 7px; height: 12px;
  border: 2px solid #0f1117;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}

/* Title column */
td.col-title {
  font-size: 13px;
  font-weight: 500;
  max-width: 340px;
}

.title-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

/* Source badge */
td.col-source { width: 100px; }

.source-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-decoration: none;
  transition: opacity 0.15s;
  white-space: nowrap;
}

.source-badge:hover { opacity: 0.8; }

.source-badge.Steam { background: #1b2838; color: #66c0f4; border: 1px solid #2a4a6b; }
.source-badge.Epic { background: #2d2d2d; color: #ccc; border: 1px solid #444; }
.source-badge.GOG { background: #2a1032; color: #c06de8; border: 1px solid #6a2a8a; }
.source-badge.Amazon { background: #2a2000; color: #ff9900; border: 1px solid #6a4400; }
.source-badge.EA { background: #2a1500; color: #f15d28; border: 1px solid #8a3010; }
.source-badge.Humble { background: #2a0a0a; color: #cc4444; border: 1px solid #7a1a1a; }
.source-badge.Unknown { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }

/* Genre tags column */
td.col-genres { max-width: 300px; }

.genre-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.genre-tag {
  padding: 1px 6px;
  background: var(--badge-bg);
  border: 1px solid var(--badge-border);
  border-radius: 3px;
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
}

.genre-tag.user-genre {
  background: rgba(124,106,247,0.15);
  border-color: var(--accent);
  color: var(--accent2);
}

/* Played row highlight */
tr.is-played td.col-title .title-text {
  color: var(--played);
}

/* Virtual scroll container */
#tableBody tr.spacer {
  background: transparent !important;
}

/* ── EMPTY STATE ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-dim);
  gap: 12px;
}

.empty-icon { font-size: 48px; opacity: 0.3; }
.empty-text { font-size: 16px; }
.empty-sub { font-size: 13px; opacity: 0.7; }

/* Scrollbar */
.main::-webkit-scrollbar { width: 6px; height: 6px; }
.main::-webkit-scrollbar-track { background: var(--bg); }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 720px) {
  .sidebar { display: none; }
  td.col-genres { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-icon">🎮</div>
    <h1>Jun's <span>Game Library</span></h1>
    <div class="header-stats">
      <div class="stat-badge">
        <strong id="totalCount">0</strong>
        <span>total</span>
      </div>
      <div class="stat-badge">
        <strong id="playedCount" style="color:var(--played)">0</strong>
        <span>played</span>
      </div>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="タイトルを検索…" autocomplete="off" spellcheck="false">
    <span class="search-icon">🔍</span>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- GENRE FILTER -->
    <div class="sidebar-section">
      <div class="sidebar-label">ジャンル</div>
      <div class="filter-mode" id="filterMode">
        <button class="active" data-mode="OR" onclick="setFilterMode('OR',this)">いずれか (OR)</button>
        <button data-mode="AND" onclick="setFilterMode('AND',this)">すべて (AND)</button>
      </div>
      <div class="genre-list" id="genreList"></div>
      <button class="clear-btn" onclick="clearGenres()">× ジャンルをクリア</button>
    </div>

    <!-- SOURCE FILTER -->
    <div class="sidebar-section">
      <div class="sidebar-label">ストア</div>
      <div class="source-list" id="sourceList"></div>
    </div>

    <!-- PLAYED FILTER -->
    <div class="sidebar-section">
      <div class="sidebar-label">プレイ状況</div>
      <div class="played-filter">
        <button class="played-btn active" data-played="all" onclick="setPlayedFilter('all',this)">すべて</button>
        <button class="played-btn" data-played="played" onclick="setPlayedFilter('played',this)">✅ 済み</button>
        <button class="played-btn" data-played="unplayed" onclick="setPlayedFilter('unplayed',this)">未プレイ</button>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <div class="main" id="mainContent">
    <div class="toolbar">
      <div class="result-count" id="resultCount"></div>
      <div class="sort-group">
        <span class="sort-label">並び替え:</span>
        <button class="sort-btn active" id="sortTitle" onclick="setSort('title',this)">
          タイトル <span class="sort-arrow" id="arrowTitle">↑</span>
        </button>
        <button class="sort-btn" id="sortSource" onclick="setSort('source',this)">
          ストア <span class="sort-arrow" id="arrowSource">↑</span>
        </button>
        <button class="sort-btn" id="sortPlayed" onclick="setSort('played',this)">
          プレイ済 <span class="sort-arrow" id="arrowPlayed">↑</span>
        </button>
      </div>
    </div>
    <table class="game-table">
      <thead>
        <tr>
          <th class="col-played" title="プレイ済み">✅</th>
          <th onclick="setSort('title', document.getElementById('sortTitle'))">タイトル</th>
          <th onclick="setSort('source', document.getElementById('sortSource'))">ストア</th>
          <th class="col-genres">ジャンル（自分のタグ）</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="empty-icon">🕹️</div>
      <div class="empty-text">ゲームが見つかりません</div>
      <div class="empty-sub">フィルターを変えてみてください</div>
    </div>
  </div>
</div>

// ── USER-DEFINED GENRE MAPPING ──
// Playniteのジャンルを自分のカテゴリに対応させる
const GENRE_MAP = {
  "アクション":      ["Action","Hack and slash/Beat 'em up","Fighting","Tactical","Beat 'em up"],
  "アドベンチャー":   ["Adventure","Point-and-click","Visual Novel"],
  "RPG":            ["Role-playing (RPG)"],
  "FPS":            ["Shooter","First-person shooter (FPS)"],
  "VR":             ["Virtual Reality (VR)","VR"],
  "ローグライク":    ["Roguelike","Roguelite","Rogue-like","Rogue-lite"],
  "シューティング":  ["Shooter","Shoot 'em up"],
  "ストラテジー":    ["Strategy","Real Time Strategy (RTS)","Turn-based strategy (TBS)","Tactical"],
  "街づくり":        ["City builder","City-builder","Town builder"],
  "サンドボックス":  ["Sandbox","Open world"],
  "サバイバル":      ["Survival"],
  "コロニーシム":    ["Colony Sim","Colony sim","Colony management"],
  "シミュレーション":["Simulator","Simulation","Management","Managerial"],
  "ホラー":          ["Horror","Survival horror"],
  "レース":          ["Racing","Race"],
  "レトロ":          ["Arcade","Retro","Classic"],
  "スポーツ":        ["Sport","Sports","MOBA","Pinball"],
  "オープンワールド":["Open world","Open-world","Sandbox"],
  "パズル":          ["Puzzle"],
  "ミステリー":      ["Mystery","Visual Novel","Thriller","Noir"],
  "テーブルトップ":  ["Card & Board Game","Board Game","Card Game","Tabletop","Turn-based strategy (TBS)"]
};

// ── STATE ──
let games = [];
let userGenres = {};   // id -> Set of user genres
let playedSet = new Set();
let selectedGenres = new Set();
let selectedSources = new Set();
let filterMode = "OR";
let playedFilter = "all";
let sortKey = "title";
let sortDir = 1;
let searchQuery = "";
let filteredGames = [];

// ── STORAGE ──
function saveState() {
  try {
    localStorage.setItem("jgl_played", JSON.stringify([...playedSet]));
    const genresObj = {};
    for (const [id, set] of Object.entries(userGenres)) {
      genresObj[id] = [...set];
    }
    localStorage.setItem("jgl_genres", JSON.stringify(genresObj));
  } catch(e) {}
}

function loadState() {
  try {
    const p = localStorage.getItem("jgl_played");
    if (p) playedSet = new Set(JSON.parse(p));
    const g = localStorage.getItem("jgl_genres");
    if (g) {
      const obj = JSON.parse(g);
      for (const [id, arr] of Object.entries(obj)) {
        userGenres[id] = new Set(arr);
      }
    }
  } catch(e) {}
}

// ── INIT ──
function init() {
  loadState();
  
  // Build game objects
  games = RAW_GAMES.map((d, idx) => {
    // Map raw genres to user genres
    const rawGenres = d.g ? d.g.split(",").map(s=>s.trim()) : [];
    const mappedGenres = new Set();
    for (const [uGenre, keywords] of Object.entries(GENRE_MAP)) {
      if (rawGenres.some(rg => keywords.some(kw => rg.toLowerCase().includes(kw.toLowerCase())))) {
        mappedGenres.add(uGenre);
      }
    }
    return {
      id: idx,
      title: d.t,
      rawGenre: d.g,
      genres: mappedGenres,
      source: d.s || "Unknown",
    };
  });

  buildSidebar();
  updateStats();
  applyFilters();
}

// ── SIDEBAR BUILD ──
function buildSidebar() {
  // Genre counts
  const genreCounts = {};
  for (const g of Object.keys(GENRE_MAP)) genreCounts[g] = 0;
  for (const game of games) {
    for (const g of game.genres) {
      if (genreCounts[g] !== undefined) genreCounts[g]++;
    }
  }

  const genreList = document.getElementById("genreList");
  genreList.innerHTML = "";
  for (const g of Object.keys(GENRE_MAP)) {
    const item = document.createElement("div");
    item.className = "genre-item";
    item.dataset.genre = g;
    item.onclick = () => toggleGenre(g, item);
    item.innerHTML = `
      <div class="genre-checkbox"></div>
      <span class="genre-name">${g}</span>
      <span class="genre-count">${genreCounts[g]}</span>
    `;
    genreList.appendChild(item);
  }

  // Source list
  const sources = ["Steam","Epic","GOG","Amazon","EA app","Humble"];
  const sourceCounts = {};
  for (const s of sources) sourceCounts[s] = 0;
  for (const game of games) {
    if (sourceCounts[game.source] !== undefined) sourceCounts[game.source]++;
    else sourceCounts[game.source] = (sourceCounts[game.source]||0)+1;
  }

  const sourceList = document.getElementById("sourceList");
  sourceList.innerHTML = "";
  for (const s of sources) {
    const cnt = sourceCounts[s] || 0;
    const dotClass = s === "EA app" ? "EA" : s;
    const item = document.createElement("div");
    item.className = "source-item";
    item.dataset.source = s;
    item.onclick = () => toggleSource(s, item);
    item.innerHTML = `
      <div class="source-checkbox"></div>
      <div class="source-dot ${dotClass}"></div>
      <span class="genre-name">${s}</span>
      <span class="genre-count">${cnt}</span>
    `;
    sourceList.appendChild(item);
  }
}

// ── FILTER CONTROLS ──
function toggleGenre(g, el) {
  if (selectedGenres.has(g)) {
    selectedGenres.delete(g);
    el.classList.remove("active");
  } else {
    selectedGenres.add(g);
    el.classList.add("active");
  }
  applyFilters();
}

function toggleSource(s, el) {
  if (selectedSources.has(s)) {
    selectedSources.delete(s);
    el.classList.remove("active");
  } else {
    selectedSources.add(s);
    el.classList.add("active");
  }
  applyFilters();
}

function setFilterMode(mode, btn) {
  filterMode = mode;
  document.querySelectorAll("#filterMode button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function clearGenres() {
  selectedGenres.clear();
  document.querySelectorAll(".genre-item").forEach(el => el.classList.remove("active"));
  applyFilters();
}

function setPlayedFilter(mode, btn) {
  playedFilter = mode;
  document.querySelectorAll(".played-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

// ── SORT ──
function setSort(key, btn) {
  if (sortKey === key) {
    sortDir *= -1;
  } else {
    sortKey = key;
    sortDir = 1;
  }
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  
  const arrows = {title: "arrowTitle", source: "arrowSource", played: "arrowPlayed"};
  for (const [k, id] of Object.entries(arrows)) {
    const el = document.getElementById(id);
    if (el) el.textContent = (k===sortKey) ? (sortDir===1?"↑":"↓") : "↑";
  }
  
  applyFilters();
}

// ── SEARCH ──
document.getElementById("searchInput").addEventListener("input", function() {
  searchQuery = this.value.toLowerCase().trim();
  applyFilters();
});

// ── FILTER + RENDER ──
function applyFilters() {
  let result = games;

  // Search
  if (searchQuery) {
    result = result.filter(g => g.title.toLowerCase().includes(searchQuery));
  }

  // Genre filter
  if (selectedGenres.size > 0) {
    if (filterMode === "OR") {
      result = result.filter(g => [...selectedGenres].some(sg => g.genres.has(sg)));
    } else {
      result = result.filter(g => [...selectedGenres].every(sg => g.genres.has(sg)));
    }
  }

  // Source filter
  if (selectedSources.size > 0) {
    result = result.filter(g => selectedSources.has(g.source));
  }

  // Played filter
  if (playedFilter === "played") {
    result = result.filter(g => playedSet.has(g.id));
  } else if (playedFilter === "unplayed") {
    result = result.filter(g => !playedSet.has(g.id));
  }

  // Sort
  result = [...result].sort((a, b) => {
    if (sortKey === "title") return sortDir * a.title.localeCompare(b.title, "ja");
    if (sortKey === "source") return sortDir * a.source.localeCompare(b.source);
    if (sortKey === "played") {
      const ap = playedSet.has(a.id) ? 1 : 0;
      const bp = playedSet.has(b.id) ? 1 : 0;
      return sortDir * (bp - ap) || a.title.localeCompare(b.title, "ja");
    }
    return 0;
  });

  filteredGames = result;
  renderTable(result);
  updateResultCount(result.length);
}

// ── STORE LINK ──
function getStoreLink(title, source) {
  const q = encodeURIComponent(title);
  switch(source) {
    case "Steam":   return `https://store.steampowered.com/search/?term=${q}`;
    case "Epic":    return `https://store.epicgames.com/en-US/browse?q=${q}`;
    case "GOG":     return `https://www.gog.com/games?search=${q}`;
    case "Amazon":  return `https://www.amazon.co.jp/s?k=${q}+PC+game`;
    case "EA app":  return `https://www.ea.com/games/search#origin=true&text=${q}`;
    case "Humble":  return `https://www.humblebundle.com/store/search?search=${q}`;
    default:        return null;
  }
}

function getSourceClass(source) {
  if (source === "EA app") return "EA";
  return source;
}

// ── VIRTUAL SCROLL ──
const ROW_HEIGHT = 38;
const BUFFER = 20;
let renderOffset = 0;

function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  const empty = document.getElementById("emptyState");
  
  if (data.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "flex";
    return;
  }
  empty.style.display = "none";
  
  // Simple full render (2k rows is fine without virtualization for GitHub Pages)
  const rows = data.map((game) => {
    const isPlayed = playedSet.has(game.id);
    const link = getStoreLink(game.title, game.source);
    const srcClass = getSourceClass(game.source);
    
    // Genre tags - show user-mapped genres highlighted
    const genreTags = [...game.genres].map(g => 
      `<span class="genre-tag user-genre">${g}</span>`
    ).join("");
    
    const badgeHtml = link 
      ? `<a class="source-badge ${srcClass}" href="${link}" target="_blank" rel="noopener">${game.source}</a>`
      : `<span class="source-badge Unknown">${game.source}</span>`;

    return `<tr class="${isPlayed ? "is-played" : ""}" data-id="${game.id}">
  <td class="col-played">
    <input type="checkbox" class="play-check" ${isPlayed ? "checked" : ""} 
           onchange="togglePlayed(${game.id}, this)" title="プレイ済みにする">
  </td>
  <td class="col-title"><span class="title-text" title="${escHtml(game.title)}">${escHtml(game.title)}</span></td>
  <td class="col-source">${badgeHtml}</td>
  <td class="col-genres"><div class="genre-tags">${genreTags}</div></td>
</tr>`;
  });
  
  tbody.innerHTML = rows.join("");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── PLAYED TOGGLE ──
function togglePlayed(id, checkbox) {
  if (checkbox.checked) {
    playedSet.add(id);
  } else {
    playedSet.delete(id);
  }
  // Update row class
  const row = checkbox.closest("tr");
  if (checkbox.checked) row.classList.add("is-played");
  else row.classList.remove("is-played");
  
  saveState();
  updateStats();
  
  // If played filter is active, re-filter
  if (playedFilter !== "all") applyFilters();
}

// ── STATS ──
function updateStats() {
  document.getElementById("totalCount").textContent = games.length.toLocaleString();
  document.getElementById("playedCount").textContent = playedSet.size.toLocaleString();
}

function updateResultCount(n) {
  const el = document.getElementById("resultCount");
  const total = games.length;
  el.innerHTML = n === total 
    ? `<strong>${n.toLocaleString()}</strong> タイトル`
    : `<strong>${n.toLocaleString()}</strong> / ${total.toLocaleString()} タイトル`;
}

// ── START ──
init();
</script>
